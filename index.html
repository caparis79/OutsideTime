<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outside Time</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0f0a;color:#e8f5e9;font-family:Georgia,serif;min-height:100vh}
#app{max-width:440px;margin:0 auto;padding-bottom:50px}
.header{display:flex;align-items:center;gap:14px;padding:28px 20px 16px;border-bottom:1px solid #1a2e1a}
.emoji{font-size:36px}
.title{font-size:24px;font-weight:900;color:#4ade80;letter-spacing:-0.5px}
.sub{font-size:13px;color:#6b9e72;margin-top:2px}
nav{display:flex;border-bottom:1px solid #1a2e1a}
nav button{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:#6b9e72;padding:12px 0;font-size:14px;cursor:pointer;font-family:inherit}
nav button.active{color:#4ade80;border-bottom-color:#4ade80;font-weight:700}
.section{display:flex;flex-direction:column;gap:12px;padding:16px 16px 0}
.card{background:#0d1a0d;border:1px solid #1a2e1a;border-radius:12px;padding:16px 18px}
.clabel{font-size:11px;font-weight:700;letter-spacing:1.5px;color:#4a7a4a;text-transform:uppercase}
.flabel{font-size:11px;color:#6b9e72;margin:10px 0 4px}
.bignum{margin-top:8px}
.bignum .h{font-size:42px;font-weight:900;color:#4ade80}
.bignum .hu{font-size:16px;color:#6b9e72}
.bignum .dash{font-size:42px;color:#2a4a2a}
.notedisp{margin-top:6px;color:#7baa7b;font-size:13px}
input[type=date],input[type=number],input[type=text]{width:100%;background:#0a120a;border:1px solid #2a4a2a;border-radius:8px;padding:12px 14px;color:#e8f5e9;font-size:16px;font-family:inherit;outline:none;color-scheme:dark}
.pastbadge{margin-top:6px;font-size:12px;color:#fb923c;display:flex;align-items:center;gap:8px}
.todaylink{background:none;border:none;color:#6b9e72;font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline;padding:0}
.logbtn{margin-top:14px;width:100%;padding:13px 0;border-radius:8px;border:none;background:#4ade80;color:#000;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #111e11}
.row:last-child{border-bottom:none}
.rlabel{color:#c8ddc8;font-size:13px}
.rsub{color:#5a8a5a;font-size:12px;margin-top:2px}
.rval{color:#4ade80;font-weight:700;font-size:14px}
.editbtn{background:none;border:1px solid #2a4a2a;border-radius:4px;color:#6b9e72;font-size:11px;padding:2px 8px;cursor:pointer;font-family:inherit}
.empty{color:#3a5a3a;font-size:13px;margin-top:10px;text-align:center;padding:10px 0}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#4ade80;color:#000;font-weight:700;padding:10px 22px;border-radius:30px;font-size:14px;z-index:999;box-shadow:0 4px 20px rgba(74,222,128,.4);display:none}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <span class="emoji">🌿</span>
    <div>
      <div class="title">Outside Time</div>
      <div class="sub">Track your hours in the open air</div>
    </div>
  </div>
  <nav>
    <button id="btn-log" class="active" onclick="showView('log')">📝 Log</button>
    <button id="btn-history" onclick="showView('history')">📅 History</button>
  </nav>
  <div id="toast"></div>

  <div id="view-log" class="section">
    <div class="card">
      <div class="clabel">Today · <span id="today-label"></span></div>
      <div class="bignum" id="today-num"></div>
      <div id="today-note" class="notedisp"></div>
    </div>
    <div class="card">
      <div class="clabel">Log hours outside</div>
      <div class="flabel">Date</div>
      <input type="date" id="inp-date" onchange="onDateChange()">
      <div id="past-badge" class="pastbadge" style="display:none">
        📅 Logging for <span id="past-label"></span>
        <button class="todaylink" onclick="resetToday()">← back to today</button>
      </div>
      <div class="flabel">Hours</div>
      <input type="number" id="inp-hours" min="0" max="24" step="0.5" placeholder="e.g. 1.5">
      <div class="flabel">Note (optional)</div>
      <input type="text" id="inp-note" placeholder="walk, gardening, beach…">
      <button class="logbtn" id="log-btn" onclick="handleLog()">Log Today</button>
    </div>
    <div class="card">
      <div class="clabel">All-time total</div>
      <div class="bignum"><span class="h" id="total-h">0.0</span><span class="hu"> hrs</span></div>
      <div style="color:#6b9e72;font-size:13px;margin-top:4px" id="days-count">0 days tracked</div>
    </div>
  </div>

  <div id="view-history" class="section" style="display:none">
    <div class="card"><div class="clabel">By Month</div><div id="list-months"></div></div>
    <div class="card"><div class="clabel">By Week</div><div id="list-weeks"></div></div>
    <div class="card"><div class="clabel">Daily Log</div><div id="list-days"></div></div>
  </div>
</div>

<script>
var STORAGE_KEY = 'outside-time-logs';
var logs = {};
var today = new Date().toISOString().slice(0,10);

function loadLogs() {
  try { logs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { logs = {}; }
}

function saveLogs() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
}

function formatDate(d) {
  var parts = d.split('-');
  return new Date(parts[0], parts[1]-1, parts[2]).toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric'});
}

function weekKey(d) {
  var date = new Date(d.split('-')[0], d.split('-')[1]-1, d.split('-')[2]);
  var day = date.getDay();
  var diff = date.getDate() - day + (day===0 ? -6 : 1);
  return new Date(date.getFullYear(), date.getMonth(), diff).toISOString().slice(0,10);
}

function monthKey(d) { return d.slice(0,7); }

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 2200);
}

function showView(v) {
  document.getElementById('view-log').style.display = v==='log' ? 'flex' : 'none';
  document.getElementById('view-history').style.display = v==='history' ? 'flex' : 'none';
  document.getElementById('btn-log').className = v==='log' ? 'active' : '';
  document.getElementById('btn-history').className = v==='history' ? 'active' : '';
  if (v==='history') renderHistory();
}

function onDateChange() {
  var d = document.getElementById('inp-date').value;
  var isToday = d === today;
  document.getElementById('past-badge').style.display = isToday ? 'none' : 'flex';
  document.getElementById('past-label').textContent = formatDate(d);
  var ex = logs[d];
  document.getElementById('inp-hours').value = ex ? ex.hours : '';
  document.getElementById('inp-note').value = ex ? (ex.note||'') : '';
  updateBtn(d);
}

function updateBtn(d) {
  var isToday = d === today;
  var label = isToday ? 'Today' : formatDate(d);
  document.getElementById('log-btn').textContent = logs[d] ? ('Update '+label) : ('Log '+label);
}

function resetToday() {
  document.getElementById('inp-date').value = today;
  onDateChange();
}

function handleLog() {
  var d = document.getElementById('inp-date').value;
  var h = parseFloat(document.getElementById('inp-hours').value);
  var n = document.getElementById('inp-note').value.trim();
  if (!h || h <= 0 || h > 24) { toast('Enter hours between 0–24'); return; }
  if (d > today) { toast("Can't log future dates"); return; }
  logs[d] = {hours: h, note: n};
  saveLogs();
  document.getElementById('inp-hours').value = '';
  document.getElementById('inp-note').value = '';
  toast('Logged! 🌿');
  render();
}

function editEntry(d) {
  document.getElementById('inp-date').value = d;
  onDateChange();
  showView('log');
}

function render() {
  // Today card
  document.getElementById('today-label').textContent = formatDate(today);
  var tl = logs[today];
  document.getElementById('today-num').innerHTML = tl
    ? '<span class="h">'+tl.hours+'</span><span class="hu"> hrs</span>'
    : '<span class="dash">—</span>';
  var tn = document.getElementById('today-note');
  tn.textContent = tl && tl.note ? '📍 '+tl.note : '';

  // Totals
  var days = Object.keys(logs);
  var total = Object.values(logs).reduce(function(s,e){ return s+e.hours; }, 0);
  document.getElementById('total-h').textContent = total.toFixed(1);
  document.getElementById('days-count').textContent = days.length+' days tracked';

  // Btn
  var d = document.getElementById('inp-date').value || today;
  updateBtn(d);
}

function renderHistory() {
  var byWeek = {}, byMonth = {};
  Object.keys(logs).forEach(function(d) {
    var e = logs[d];
    var wk = weekKey(d); byWeek[wk] = (byWeek[wk]||0) + e.hours;
    var mo = monthKey(d); byMonth[mo] = (byMonth[mo]||0) + e.hours;
  });

  var months = Object.keys(byMonth).sort().reverse().slice(0,6);
  var mEl = document.getElementById('list-months');
  if (!months.length) { mEl.innerHTML = '<div class="empty">No data yet</div>'; }
  else mEl.innerHTML = months.map(function(mo) {
    var label = new Date(mo+'-02').toLocaleDateString('en-US',{month:'long',year:'numeric'});
    return '<div class="row"><span class="rlabel">'+label+'</span><span class="rval">'+byMonth[mo].toFixed(1)+' hrs</span></div>';
  }).join('');

  var weeks = Object.keys(byWeek).sort().reverse().slice(0,8);
  var wEl = document.getElementById('list-weeks');
  if (!weeks.length) { wEl.innerHTML = '<div class="empty">No data yet</div>'; }
  else wEl.innerHTML = weeks.map(function(wk) {
    return '<div class="row"><span class="rlabel">Week of '+formatDate(wk)+'</span><span class="rval">'+byWeek[wk].toFixed(1)+' hrs</span></div>';
  }).join('');

  var days = Object.keys(logs).sort().reverse();
  var dEl = document.getElementById('list-days');
  if (!days.length) { dEl.innerHTML = '<div class="empty">No entries yet</div>'; }
  else dEl.innerHTML = days.map(function(d) {
    var e = logs[d];
    return '<div class="row"><div><div class="rlabel">'+formatDate(d)+'</div>'+(e.note?'<div class="rsub">'+e.note+'</div>':'')+'</div>'
      +'<div style="display:flex;align-items:center;gap:10px"><span class="rval">'+e.hours+' hrs</span>'
      +'<button class="editbtn" onclick="editEntry(\''+d+'\')">edit</button></div></div>';
  }).join('');
}

// Boot
loadLogs();
document.getElementById('inp-date').value = today;
document.getElementById('inp-date').max = today;
render();
</script>
</body>
</html>
